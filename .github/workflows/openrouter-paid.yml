name: OpenRouter Paid Integration

on:
  workflow_dispatch:

jobs:
  openrouter-paid:
    name: Step 3.5 Flash paid tests
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up BEAM
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19.5"

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-paid-${{ hashFiles('mix.lock') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Run paid OpenRouter tests
        run: mix test --only paid_openrouter
